{% extends 'base.html' %}

{% block content %}
<div class="flex justify-center items-center min-h-[80vh]">
    <div class="w-full max-w-2xl">
        <div class="bg-white/95 backdrop-blur-sm rounded-3xl shadow-2xl p-8 transition-all duration-300 hover:shadow-3xl">
            <h2 class="text-4xl font-extrabold text-center mb-3 bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent">
                Is it funny?
            </h2>
            <p class="text-center text-gray-500 mb-8">
                Enter a short text or joke to see if our AI gets the punchline.
            </p>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-6">
                    <textarea name="text_input" rows="4" 
                              class="w-full px-5 py-3 text-gray-700 border-2 border-gray-200 rounded-2xl focus:outline-none focus:border-blue-400 focus:ring-4 focus:ring-blue-100 transition-all resize-none"
                              placeholder="e.g., Why did the chicken cross the road? To get to the other side!" required></textarea>
                </div>
                <button type="submit" 
                        class="w-full bg-gray-900 hover:bg-gray-800 text-white font-bold py-3 px-6 rounded-2xl transition-all duration-300 transform hover:scale-[1.02] hover:shadow-lg active:scale-[0.98]">
                    Analyze Humor
                </button>
            </form>

            {% if result %}
                <div class="mt-8 animate-fade-in-up">
                    {% if result.error %}
                        <div class="bg-amber-50 border-l-4 border-amber-500 text-amber-700 p-4 rounded-xl shadow-sm">
                            {{ result.error }}
                        </div>
                    {% else %}
                        <div class="p-6 rounded-2xl text-center transition-all duration-300 {% if result.is_humorous %}bg-emerald-50 border-2 border-emerald-400 shadow-lg shadow-emerald-100{% else %}bg-gray-50 border-2 border-gray-300 shadow-md{% endif %}">
                            <h3 class="text-4xl font-bold mb-3 {% if result.is_humorous %}text-emerald-700{% else %}text-gray-600{% endif %}">
                                {{ result.label }}
                            </h3>
                            <!-- <p class="mb-3 text-gray-700">
                                <strong class="font-semibold">Confidence:</strong> 
                                <span class="{% if result.is_humorous %}text-emerald-600{% else %}text-gray-500{% endif %}">
                                    {{ result.confidence }}
                                </span>
                            </p> -->
                            <div class="border-t border-gray-200 my-4 w-16 mx-auto"></div>
                            <p class="italic text-gray-500 bg-white/50 rounded-xl p-3">
                                "{{ result.text }}"
                            </p>
                        </div>
                    {% endif %}
                </div>
            {% endif %}
        </div>
    </div>
</div>

<style>
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .animate-fade-in-up {
        animation: fadeInUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    
    .hover\:shadow-3xl:hover {
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
</style>
{% endblock %}
