<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Humor Detector{% endblock %}</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Optional: Add custom configuration to override defaults -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in-up': 'fadeInUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1)',
                    },
                    keyframes: {
                        fadeInUp: {
                            'from': { opacity: '0', transform: 'translateY(12px)' },
                            'to': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for better visual */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-gray-100 font-sans min-h-screen">

    <!-- Navigation - Tailwind styled -->
    <nav class="bg-gray-900 shadow-lg mb-8">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a class="text-white text-xl font-bold tracking-tight hover:text-gray-300 transition" href="{% url 'home' %}">
                HumorAI
            </a>
            <div class="flex items-center space-x-3">
                {% if user.is_authenticated %}
                    <span class="text-gray-300 text-sm">
                        Welcome, <strong class="text-white">{{ user.username }}</strong>
                    </span>
                    <a href="{% url 'logout' %}" class="bg-red-600 hover:bg-red-700 text-white text-sm font-medium px-3 py-1.5 rounded-lg transition duration-200 shadow-sm">
                        Logout
                    </a>
                {% else %}
                    <a href="{% url 'login' %}" class="text-gray-300 hover:text-white text-sm font-medium px-3 py-1.5 rounded-lg transition duration-200">
                        Login
                    </a>
                    <a href="{% url 'register' %}" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-3 py-1.5 rounded-lg transition duration-200 shadow-sm">
                        Register
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Main content container -->
    <div class="container mx-auto px-4 py-2">
        {% block content %}
        <!-- Child templates will insert content here -->
        {% endblock %}
    </div>

</body>
</html>
